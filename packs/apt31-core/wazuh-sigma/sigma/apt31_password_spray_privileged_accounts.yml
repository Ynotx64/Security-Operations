title: APT31 Password Spray Privileged Accounts
id: apt31-0001
status: experimental
description: Detects repeated failed authentication attempts against privileged or shared accounts.
logsource:
  category: authentication
detection:
  failure:
    EventID:
      - 4625
  timeframe: 15m
  condition: failure
falsepositives:
  - User typo bursts
  - Misconfigured automation against admin account
level: high
tags:
  - attack.t1110.003
  - attack.credential_access
