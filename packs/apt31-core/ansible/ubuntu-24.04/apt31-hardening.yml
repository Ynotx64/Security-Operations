---
- name: APT31 Ubuntu 24.04 hardening
  hosts: all
  become: true
  vars_files:
    - group_vars/all.yml

  handlers:
    - name: restart ssh
      ansible.builtin.service:
        name: ssh
        state: restarted

  tasks:
    - name: Install baseline packages
      ansible.builtin.apt:
        name:
          - ufw
          - fail2ban
          - auditd
          - unattended-upgrades
          - apt-listchanges
          - rsyslog
        state: present
        update_cache: true

    - name: Enable unattended upgrades
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        mode: "0644"
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
      when: apt31_enable_unattended_upgrades | bool

    - name: Disable SSH root login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
      when: apt31_disable_root_ssh | bool
      notify: restart ssh

    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      when: apt31_disable_password_ssh | bool
      notify: restart ssh

    - name: Set UFW default deny incoming
      community.general.ufw:
        direction: incoming
        policy: deny
      when: apt31_enable_ufw | bool

    - name: Set UFW default allow outgoing
      community.general.ufw:
        direction: outgoing
        policy: allow
      when: apt31_enable_ufw | bool

    - name: Allow SSH from approved admin sources
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp
        src: "{{ item }}"
      loop: "{{ apt31_allowed_admin_sources }}"
      when: apt31_enable_ufw | bool

    - name: Enable fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: started
        enabled: true
      when: apt31_enable_fail2ban | bool

    - name: Enable auditd
      ansible.builtin.service:
        name: auditd
        state: started
        enabled: true
      when: apt31_enable_auditd | bool

    - name: Enable rsyslog
      ansible.builtin.service:
        name: rsyslog
        state: started
        enabled: true

    - name: Enable UFW
      community.general.ufw:
        state: enabled
      when: apt31_enable_ufw | bool
