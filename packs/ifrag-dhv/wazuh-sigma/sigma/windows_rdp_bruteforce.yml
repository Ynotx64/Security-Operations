title: Windows RDP Brute Force Attempts
id: 1d278b0f-4a54-4d66-8ff9-1b9fdhv0001
status: experimental
description: Detects multiple failed RDP logons that may indicate brute-force or password-spray activity.
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4625
    LogonType: 10
  timeframe: 15m
  condition: selection | count(TargetUserName) by ComputerName >= 8
falsepositives:
  - User repeatedly entering an incorrect password
level: high
tags:
  - attack.t1110
  - attack.initial_access
