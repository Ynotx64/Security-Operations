---
- name: Triage collection only
  hosts: soc-admin
  gather_facts: false
  vars:
    target_host: "ids-management"
    collect_host: "ids-management"

  pre_tasks:
    - name: Generate fixed incident id for this run
      ansible.builtin.set_fact:
        incident_id: "IR-{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"
        case_artifact_dir: "{{ case_artifact_root }}/IR-{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"

    - name: Ensure case artifact directory exists
      ansible.builtin.file:
        path: "{{ case_artifact_dir }}"
        state: directory
        mode: "0750"

  tasks:
    - name: Collect Suricata evidence
      ansible.builtin.include_role:
        name: suricata_collect

    - name: Collect Wazuh evidence
      ansible.builtin.include_role:
        name: wazuh_collect

    - name: Collect host triage
      ansible.builtin.include_role:
        name: host_triage
